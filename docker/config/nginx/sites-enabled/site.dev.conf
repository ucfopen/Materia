server {
	listen *:80;
	server_name default;

	root /var/www/html/staticfiles;
	index index.html;

	# Development: Disable caching for faster iteration
	location / {
		try_files $uri @handler;
		add_header Cache-Control "no-store, no-cache, must-revalidate";
		expires off;
	}

	location @handler {
		proxy_pass http://python:8001;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_read_timeout    300;
		proxy_send_timeout    300;
		proxy_connect_timeout 300;

		proxy_redirect off;
	}

	# Automatically check to see if an image theme override exists, then fall back to default
	location ~/static/img/(.*)$ {
		try_files /theme/img/$1 /img/$1;
		autoindex on;
		add_header Cache-Control "no-store, no-cache, must-revalidate";
	}

	location /static {
		alias /var/www/html/staticfiles;
		autoindex on;
		add_header Cache-Control "no-store, no-cache, must-revalidate";
	}

	# Development: Redirect /js requests to /dist/js for webpack dev builds
	location /js/ {
		alias /var/www/html/staticfiles/dist/js/;
		autoindex on;
		add_header Cache-Control "no-store, no-cache, must-revalidate";
		# Fallback to regular /js if dist doesn't exist
		try_files $uri $uri/ @js_fallback;
	}

	location @js_fallback {
		rewrite ^/js/(.*)$ /staticfiles/js/$1 break;
		proxy_pass http://python:8001;
	}

	# Prevent django's 404 page from appearing on static assets
	# Firefox freaks out when its expecting a .js file and it gets a django's html instead
	location /widget/ {
		try_files $uri =404;
	}
}
