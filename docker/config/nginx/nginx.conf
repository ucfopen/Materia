worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Performance settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Global limits
    client_max_body_size 20M;
    client_body_buffer_size 32k;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-javascript application/rss+xml
               font/truetype font/opentype application/vnd.ms-fontobject
               image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 1000;  # Don't compress responses smaller than 1KB
    gzip_buffers 16 8k;     # Memory buffers for compression

    # Proxy buffer settings (global for all proxied requests)
    proxy_buffer_size   16k;
    proxy_buffers   8 8k;
    proxy_busy_buffers_size   8k;

    include /etc/nginx/conf.d/*.conf;
}