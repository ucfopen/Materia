name: materia-django

networks:
  backend:
  frontend:

services:
  nginx:
    build:
      context: ../
      dockerfile: materia-app.nginx.Dockerfile
    ports:
      - "420:80"
    volumes:
      - ../public:/var/www/html/staticfiles:ro
      - ../theme/img:/var/www/html/staticfiles/theme/img:ro
      - ../public/widget:/var/www/html/staticfiles/widget/:ro
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - frontend
      - backend
    depends_on:
      - python

  python:
    build:
      context: ../
      dockerfile: materia-app.python.Dockerfile
    networks:
      - backend
    ports:
      - "8001:8001"
      - "25:25"
    depends_on:
      - mysql
    environment:
      - DJANGO_ENV=dev
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=materia_dev
      - MYSQL_USER=materia_user
      - MYSQL_PASSWORD=kogneato
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
    env_file:
      - .env
    volumes:
      - ../app:/var/www/html
      - uploaded_media:/var/www/html/media/
      - ../public/widget:/var/www/html/staticfiles/widget/:rw
      - ./config/uwsgi/:/etc/uwsgi
    command: /wait_for_it.sh mysql:3306 -t 15 -- gunicorn materia.wsgi:application --bind 0.0.0.0:8001 --workers 4 --threads 2 --timeout 150 --log-level info --access-logfile - --error-logfile -

  mysql:
    image: mariadb:10.6
    networks:
      - backend
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=materia_dev
      - MYSQL_USER=materia_user
      - MYSQL_PASSWORD=kogneato
    volumes:
      - ./config/mysql/override.cnf:/etc/mysql/conf.d/override.cnf

  fakes3:
    image: ghcr.io/ucfopen/materia:fake-s3-dev
    build:
      context: ../
      dockerfile: materia-fake-s3.Dockerfile
    volumes:
      - s3_media:/s3mnt/fakes3_root/fake_bucket/media/
    ports:
      - "10001:10001"
    networks:
      - frontend
      - backend

  redis:
    image: redis:3.2
    ports:
      - "6379:6379"
    networks:
      - backend

volumes:
  # static_files: {} # compiled js/css and uploaded widgets
  uploaded_media: {} # uploaded media files
  s3_media: {}
